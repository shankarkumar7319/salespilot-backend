<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Admin Dashboard</title>
  <link rel="stylesheet" href="/css/style2.css" />
  <link rel="stylesheet" href="/css/dashboard.css" />
</head>
<body>

<div class="app">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <h2 class="logo">⚙️ Admin Panel</h2> 

    <div class="nav-item active">🏠 Dashboard</div>
    <div class="nav-item" onclick="window.location.href='/add-product.html'">
      ➕ Add Product
    </div>
    <div class="nav-item" onclick="window.location.href='/all-products-admin.html'">
      📦 All Products
    </div>
  </aside>

  <!-- MAIN -->
  <div class="main">

    <!-- TOPBAR -->
    <div class="topbar">
      <h1>Admin Dashboard</h1>

      <div class="user-info">
        <span id="welcomeText"></span>
        <button id="themeToggle">🌙</button>
        <button class="btn-logout" onclick="logout()">Logout</button>
      </div>
    </div>

	<div class="content">

	  <!-- CARDS -->
	  <div class="cards">

	    <div class="card blue">
	      <p>Total Orders</p>
	      <h2 id="orders">0</h2>
	    </div>

	    <div class="card green">
	      <p>Total Revenue</p>
	      <h2>₹<span id="revenue">0</span></h2>
	    </div>

	    <div class="card purple">
	      <p>Users</p>
	      <h2 id="users">0</h2>
	    </div>

	  </div>

	  <!-- RECENT ORDERS -->
	  <div class="table-box">
	    <h3>Recent Orders</h3>

	    <table>
	      <thead>
	        <tr>
	          <th>Order ID</th>
	          <th>All Users</th>
	          <th>Total</th>
	          <th>Status</th>
	        </tr>
	      </thead>

	      <tbody id="orderTable"></tbody>
	    </table>
	  </div>

	</div>
	
  </div>
</div>

<script src="/js/admin.js"></script>
<script src="/js/toggle.js"></script>

</body>
</html>
