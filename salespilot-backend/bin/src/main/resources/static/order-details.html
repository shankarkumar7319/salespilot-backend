<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8" />
	<title>Order Details</title>
	<link rel="stylesheet" href="/css/style2.css" />
	<link rel="stylesheet" href="/css/order-details.css" />

</head>

<body>

	<div class="app">

		<!-- SIDEBAR -->
		<aside class="sidebar">
			<h2 class="logo">🚀 SalesPilot</h2>

			<div class="nav-item" onclick="startShopping()">🛍 Start Shop</div>
			<div class="nav-item" onclick="goToCart()">🛒 View Cart</div>
			<div class="nav-item active" onclick="goToOrders()">📦 Orders</div>
			<div class="nav-item" onclick="goToTransactions()">💳 Transactions</div>
		</aside>

		<!-- MAIN -->
		<div class="main">

			<!-- TOPBAR -->
			<div class="topbar">
				<h1>Orders Details</h1>

				<div class="user-info">
					<button id="themeToggle">🌙</button>
					<button class="btn-logout" onclick="goBack()">Back</button>
				</div>
			</div>


			<div class="summary">
				<p><b>Order ID:</b> <span id="orderId"></span></p>
				<p><b>Status:</b> <span id="orderStatus"></span></p>
				<p><b>Total:</b> <span id="orderTotal"></span></p>
			</div>

			<div class="timeline">

				<div class="step active">
					<div class="circle"></div>
					<p>Order Placed</p>
				</div>

				<div class="step">
					<div class="circle"></div>
					<p>Shipped</p>
				</div>

				<div class="step">
					<div class="circle"></div>
					<p>Out for Delivery</p>
				</div>

				<div class="step">
					<div class="circle"></div>
					<p>Delivered</p>
				</div>


				<div id="itemsContainer" class="items"></div>
			</div>
		</div>
	</div>

	<script src="/js/order-details.js"></script>
	<script src="/js/toggle.js"></script>

</body>

</html>
